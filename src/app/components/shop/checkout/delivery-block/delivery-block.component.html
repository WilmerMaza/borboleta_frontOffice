<div class="checkout-detail">
  <div class="row g-4">
    <div class="col-xxl-6">
      <div class="delivery-option">
        <div class="delivery-category">
          <div class="shipment-detail w-100">
            <div class="form-check custom-form-check hide-check-box">
              <input class="form-check-input" type="radio" name="deliveryOption" id="standard" [checked]="true" (change)="setDeliveryDescription('standard')">
              <label class="form-check-label" for="standard">
                {{ 'standard_delivery' | translate }} | {{ 'delivery_dispatch_time' | translate }}
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-xxl-6">
      <div class="delivery-option">
        <div class="delivery-category">
          <div class="shipment-detail w-100">
            <div class="form-check mb-0 custom-form-check show-box-checked">
              <input class="form-check-input" type="radio" name="deliveryOption" id="national" (change)="setDeliveryDescription('national')">
              <label class="form-check-label" for="national">
                {{ 'national_delivery' | translate }} | {{ 'delivery_time_carrier' | translate }}
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
